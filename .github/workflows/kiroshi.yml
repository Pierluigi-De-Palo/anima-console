name: KIROSHI fake checker

# Si attiva quando apri (o riapri) una issue con l'etichetta "kiroshi".
on:
  issues:
    types: [opened, reopened, labeled]

permissions:
  issues: write
  contents: write

jobs:
  verifica:
    # Gira solo sulle issue etichettate "kiroshi"
    if: contains(join(github.event.issue.labels.*.name, ','), 'kiroshi')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installa dipendenze
        run: pip install anthropic

      - name: Esegui KIROSHI
        id: kiroshi
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_LABELS: ${{ join(github.event.issue.labels.*.name, ',') }}
        run: python scripts/kiroshi_check.py

      - name: Pubblica il verdetto nella issue
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.issue.number }}
          body-path: kiroshi_comment.md

      - name: Salva il verdetto nel repo (per la dashboard)
        run: |
          git config user.name "kiroshi-bot"
          git config user.email "kiroshi-bot@users.noreply.github.com"
          git add docs/data/
          git commit -m "KIROSHI: verifica #${{ github.event.issue.number }}" || echo "niente da committare"
          git push
